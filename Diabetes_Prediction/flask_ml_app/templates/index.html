<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            margin-top: 50px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            background-color: white;
            max-width: 600px; /* Set a max width for the container */
            width: 90%; /* Adjust to control the width on smaller screens */
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #007bff;
        }
        .form-group label {
            font-weight: bold;
        }
        .btn-primary {
            width: 100%;
        }
        .result {
            text-align: center;
            margin-top: 20px;
        }
        .color-success {
            color: #28a745;
        }
        .color-danger {
            color: #dc3545;
        }
        /* Custom width for the age input */
        .input-age {
            width: 60%; /* Adjust this width as needed */
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Diabetes Prediction</h2>
        <form method="POST" class="mt-4">
            <div class="form-group">
                <label for="pregnancies">Pregnancies:</label>
                <input placeholder="range(1-135)" type="number" class="form-control" name="pregnancies" required>
            </div>
            <div class="form-group">
                <label for="glucose">Glucose:</label>
                <input placeholder="range(0-199)" type="number" class="form-control" name="glucose" required>
            </div>
            <div class="form-group">
                <label for="blood_pressure">Blood Pressure:</label>
                <input placeholder="range(0-122)" type="number" class="form-control" name="blood_pressure" required>
            </div>
            <div class="form-group">
                <label for="skin_thickness">Skin Thickness:</label>
                <input placeholder="range(0-99)" type="number" class="form-control" name="skin_thickness" required>
            </div>
            <div class="form-group">
                <label for="insulin">Insulin:</label>
                <input placeholder="range(0-846)" type="number" class="form-control" name="insulin" required>
            </div>
            <div class="form-group">
                <label for="bmi">BMI:</label>
                <input placeholder="range(0-67.1)" type="number" step="0.01" class="form-control" name="bmi" required>
            </div>
            <div class="form-group">
                <label for="diabetes_pedigree_function">Diabetes Pedigree Function:</label>
                <input placeholder="range(0.078-2.42)" type="number" step="0.01" class="form-control" name="diabetes_pedigree_function" required>
            </div>
            <div class="form-group">
                <label for="age">Age:</label>
                <input placeholder="range(21-81)" type="number" class="form-control input-age" name="age" required>
            </div>
            <button type="submit" class="btn btn-primary">Predict</button>
        </form>

        {% if prediction is not none %}
            <div class="result">
                {% if prediction == 0 %}
                    <h4>Prediction: <b class="color-success">Person is diabetes negative</b></h4>
                {% elif prediction == 1 %}
                    <h4>Prediction: <b class="color-danger">Person is diabetes positive</b></h4>
                {% else %}
                    <h4>Prediction: <b>Data entry is not correct.</b></h4>
                {% endif %}
            </div>
        {% endif %}
    </div>
</body>
</html>
